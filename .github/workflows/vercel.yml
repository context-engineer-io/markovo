name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ENV=preview
          else
            ENV=production
          fi

          npx vercel@latest pull \
            --yes \
            --environment=$ENV \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npx vercel@latest build --yes --token=${{ secrets.VERCEL_TOKEN }}
          else
            npx vercel@latest build --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Deploy
        id: deploy
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            URL=$(npx vercel@latest deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }})
          else
            URL=$(npx vercel@latest deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          fi

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'
            const body = `✅ Vercel Preview: ${url}`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
